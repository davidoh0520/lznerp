<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LZN ERP - 매입매출 관리</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="display:flex; margin:0; padding:0; min-height:100vh; background:#f8fafc;">

    <nav class="sidebar" style="width:240px; min-height:100vh; background:#0f172a; color:white; padding:20px 0; position:fixed; top:0; left:0; height:100vh; overflow-y:auto; z-index:100; display:flex; flex-direction:column;">
        <div class="logo" style="padding:0 20px 30px; border-bottom:1px solid rgba(255,255,255,0.1);">
            <h2 style="font-size:1.5rem;">LZN ERP</h2>
            <small style="color:#94a3b8; font-size:0.8rem;">매입매출 관리</small>
        </div>
        <ul class="nav-menu" style="list-style:none; padding:20px 0; flex:1;">
            <li><a href="#dashboard" class="active" data-page="dashboard" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;">📊 대시보드</a></li>
            <li><a href="#items" data-page="items" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;">📦 품목 관리</a></li>
            <li><a href="#partners" data-page="partners" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;">🏢 거래처 관리</a></li>
            <li><a href="#purchases" data-page="purchases" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;">📥 매입 관리</a></li>
            <li><a href="#exports" data-page="exports" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;">📤 수출 관리</a></li>
            <li><a href="#payments" data-page="payments" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;">💰 수금 관리</a></li>
            <li><a href="#documents" data-page="documents" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;">📎 서류 관리</a></li>
            <li><a href="#settings" data-page="settings" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;">⚙️ 설정</a></li>
        </ul>
        <div class="user-info" style="padding:16px 24px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:0.9rem; color:#cbd5e1;">관리자</span>
            <button id="logoutBtn" class="btn-logout" style="background:#dc2626; color:white; padding:6px 14px; border-radius:8px; font-size:0.8rem; border:none; cursor:pointer;">로그아웃</button>
        </div>
    </nav>

    <main class="main-content" style="flex:1; padding:24px 32px; margin-left:240px; min-height:100vh; width:calc(100% - 240px);">
        <header class="top-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
            <h1 id="pageTitle" style="font-size:1.8rem; font-weight:700;">대시보드</h1>
            <div class="header-actions" style="display:flex; gap:12px;">
                <button id="refreshBtn" class="btn-secondary" style="background:#e2e8f0; color:#334155; padding:8px 20px; border-radius:8px; font-weight:500; border:none; cursor:pointer;">🔄 새로고침</button>
            </div>
        </header>
        <div id="pageContent">
            <!-- 페이지 내용이 여기에 동적으로 로드됩니다 -->
        </div>
    </main>

    <div id="modal" class="modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:200;">
        <div class="modal-content" style="background:white; padding:32px; border-radius:8px; max-width:700px; width:90%; max-height:90vh; overflow-y:auto; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3);">
            <span class="close-btn" style="position:absolute; top:12px; right:20px; font-size:1.8rem; cursor:pointer; color:#94a3b8;">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
    <script src="pages/dashboard.js"></script>
    <script src="pages/items.js"></script>
    <script src="pages/partners.js"></script>
    <script src="pages/purchases.js"></script>
    <script src="pages/exports.js"></script>
    <script src="pages/payments.js"></script>
    <script src="pages/documents.js"></script>
    <script src="pages/settings.js"></script>

    <style>
        .modal.hidden {
            display: none !important;
        }
        .modal:not(.hidden) {
            display: flex !important;
        }
    </style>
</body>
</html>
