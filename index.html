<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="app.title">LZN ERP - Purchase &amp; Sales Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="i18n.js"></script>
</head>
<body style="display:flex; margin:0; padding:0; min-height:100vh; background:#f8fafc;">

    <nav class="sidebar" style="width:240px; min-height:100vh; background:#0f172a; color:white; padding:20px 0; position:fixed; top:0; left:0; height:100vh; overflow-y:auto; z-index:100; display:flex; flex-direction:column;">
        <div class="logo" style="padding:0 20px 30px; border-bottom:1px solid rgba(255,255,255,0.1);">
            <h2 style="font-size:1.5rem;">LZN ERP</h2>
            <small style="color:#94a3b8; font-size:0.8rem;" data-i18n="app.subtitle">Purchase &amp; Sales Management</small>
        </div>
        <ul class="nav-menu" style="list-style:none; padding:20px 0; flex:1;">
            <li><a href="#dashboard" class="active" data-page="dashboard" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;" data-i18n="nav.dashboard">📊 Dashboard</a></li>
            <li><a href="#items" data-page="items" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;" data-i18n="nav.items">📦 Items</a></li>
            <li><a href="#partners" data-page="partners" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;" data-i18n="nav.partners">🏢 Partners</a></li>
            <li><a href="#purchases" data-page="purchases" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;" data-i18n="nav.purchases">📥 Purchases</a></li>
            <li><a href="#exports" data-page="exports" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;" data-i18n="nav.exports">📤 Exports</a></li>
            <li><a href="#payments" data-page="payments" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;" data-i18n="nav.payments">💰 Payments</a></li>
            <li><a href="#documents" data-page="documents" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;" data-i18n="nav.documents">📎 Documents</a></li>
            <li><a href="#settings" data-page="settings" style="display:block; padding:12px 24px; color:#cbd5e1; font-size:0.95rem; border-left:3px solid transparent; text-decoration:none;" data-i18n="nav.settings">⚙️ Settings</a></li>
        </ul>
        <div style="padding:12px 24px; border-top:1px solid rgba(255,255,255,0.1);">
            <div style="font-size:0.75rem; color:#94a3b8; margin-bottom:6px;" data-i18n="settings.language">🌐 Language / 语言</div>
            <div style="display:flex; gap:6px;">
                <button class="lang-btn" data-lang="en" onclick="switchLang('en')" style="flex:1; background:rgba(255,255,255,0.05); color:#94a3b8; border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:4px 0; font-size:0.8rem; cursor:pointer;">EN</button>
                <button class="lang-btn" data-lang="zh-CN" onclick="switchLang('zh-CN')" style="flex:1; background:rgba(255,255,255,0.05); color:#94a3b8; border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:4px 0; font-size:0.8rem; cursor:pointer;">中文</button>
            </div>
        </div>
        <div class="user-info" style="padding:16px 24px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:0.9rem; color:#cbd5e1;" data-i18n="user.admin">Admin</span>
            <button id="logoutBtn" class="btn-logout" style="background:#dc2626; color:white; padding:6px 14px; border-radius:8px; font-size:0.8rem; border:none; cursor:pointer;" data-i18n="user.logout">Logout</button>
        </div>
    </nav>

    <main class="main-content" style="flex:1; padding:24px 32px; margin-left:240px; min-height:100vh; width:calc(100% - 240px);">
        <header class="top-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
            <h1 id="pageTitle" style="font-size:1.8rem; font-weight:700;" data-i18n="page.dashboard">📊 Dashboard</h1>
            <div class="header-actions" style="display:flex; gap:12px;">
                <button id="refreshBtn" class="btn-secondary" style="background:#e2e8f0; color:#334155; padding:8px 20px; border-radius:8px; font-weight:500; border:none; cursor:pointer;" data-i18n="btn.refresh">🔄 Refresh</button>
            </div>
        </header>
        <div id="pageContent">
        </div>
    </main>

    <div id="modal" class="modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:200;">
        <div class="modal-content" style="background:white; padding:32px; border-radius:8px; max-width:700px; width:90%; max-height:90vh; overflow-y:auto; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3);">
            <span class="close-btn" style="position:absolute; top:12px; right:20px; font-size:1.8rem; cursor:pointer; color:#94a3b8;">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
    <script src="pages/dashboard.js"></script>
    <script src="pages/items.js"></script>
    <script src="pages/partners.js"></script>
    <script src="pages/purchases.js"></script>
    <script src="pages/exports.js"></script>
    <script src="pages/payments.js"></script>
    <script src="pages/documents.js"></script>
    <script src="pages/settings.js"></script>

    <style>
        .modal.hidden {
            display: none !important;
        }
        .modal:not(.hidden) {
            display: flex !important;
        }
        .lang-btn.active {
            background: rgba(255,255,255,0.25) !important;
            color: white !important;
            border-color: rgba(255,255,255,0.5) !important;
        }
    </style>
</body>
</html>
